<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NETSIM 网表生成器</title>
</head>
<body>
<h1>NETSIM 网表生成器</h1>
<p>导入INPUT.ATN文件，生成网表</p>

<div style="margin-bottom:15px;">
<input type="file" id="fileInput" accept=".ATN,.atn">
<button type="button" id="btnLoad">导入文件</button>
<button type="button" id="btnClear">清空</button>
<span id="fileName" style="margin-left:10px;color:green;font-weight:bold;"></span>
</div>

<div style="max-width:800px;">
<textarea id="output" style="width:100%;height:420px;font-family:monospace;" readonly placeholder="网表输出将显示在这里"></textarea>
<br>
<button type="button" id="btnDownload">下载网表文件</button>
<p id="status"></p>
<button type="button" id="btnGenerate" style="background:#4a90d9;color:white;padding:12px 30px;border:none;margin-top:10px;">生成网表</button>
</div>

<script>
// ============================================================
//  API 配置 — 部署 CF Workers 后替换为你的实际 API 地址
// ============================================================
// 格式: https://netsim-core-api.<你的CF子域名>.workers.dev/api/parse
// 示例: https://netsim-core-api.henry.workers.dev/api/parse
var API_BASE = 'https://netsim-core-api.hjdeng.workers.dev';
// ============================================================

document.getElementById('btnLoad').onclick = function() {
  var file = document.getElementById('fileInput').files[0];
  if (!file) { alert('请选择文件'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    // 暂存 ATN 文本，等待生成网表时一起发送
    window._currentATN = e.target.result;
    document.getElementById('fileName').innerText = '已导入: ' + file.name;
    document.getElementById('status').innerText = '已就绪，请点击"生成网表"';
  };
  reader.readAsText(file);
};

document.getElementById('btnClear').onclick = function() {
  document.getElementById('fileInput').value = '';
  document.getElementById('fileName').innerText = '';
  document.getElementById('output').value = '';
  document.getElementById('status').innerText = '';
  window._currentATN = '';
};

document.getElementById('btnGenerate').onclick = async function() {
  var atn = window._currentATN;
  if (!atn) { alert('请先导入 ATN 文件'); return; }
  document.getElementById('status').innerText = '正在解析中...';
  document.getElementById('btnGenerate').disabled = true;
  try {
    var res = await fetch(API_BASE + '/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ atn: atn })
    });
    var data = await res.json();
    if (data.error) {
      document.getElementById('status').innerText = '解析错误: ' + data.error;
    } else {
      document.getElementById('output').value = data.netlist;
      document.getElementById('status').innerText = '网表生成完成! (' + data.stats.chars + ' chars, ' + data.stats.lines + ' lines)';
    }
  } catch (err) {
    document.getElementById('status').innerText = '网络错误: ' + err.message;
  } finally {
    document.getElementById('btnGenerate').disabled = false;
  }
};

document.getElementById('btnDownload').onclick = function() {
  var text = document.getElementById('output').value;
  if (!text) { alert('请先生成网表!'); return; }
  var inputFile = document.getElementById('fileName').innerText.replace('已导入: ', '');
  var fileName;
  if (inputFile) {
    fileName = inputFile.replace(/\.ATN$/i, '.sp');
  } else {
    fileName = 'netlist.sp';
  }
  var blob = new Blob([text], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
};
</script>
</body>
</html>
