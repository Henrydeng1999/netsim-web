<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Mechanism — ecNetSim</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0d1b2a;
  color: #e0e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

h1 {
  font-size: 16px;
  color: #66ccff;
  letter-spacing: 1px;
  margin-bottom: 4px;
  text-align: center;
}
.mech-label {
  font-size: 13px;
  color: #00ff88;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 28px;
  text-align: center;
}

#errorMsg {
  color: #ff8888;
  font-size: 14px;
  text-align: center;
  line-height: 2;
  display: none;
}

#diagramWrap {
  width: 100%;
  max-width: 860px;
}

#flowSvg {
  width: 100%;
  display: block;
  overflow: visible;
}

/* legend */
.legend {
  margin-top: 16px;
  display: flex;
  gap: 24px;
  justify-content: center;
  font-size: 11px;
  color: #557799;
}
.legend span { display: flex; align-items: center; gap: 6px; }

/* back button */
.back-btn {
  margin-top: 28px;
  padding: 7px 24px;
  background: transparent;
  border: 1px solid #3388ff;
  color: #66ccff;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
}
.back-btn:hover { background: rgba(51,136,255,0.12); }

/* tooltip */
.tip {
  position: fixed;
  background: rgba(8,18,32,0.96);
  border: 1px solid #336688;
  border-radius: 7px;
  padding: 7px 13px;
  font-size: 11px;
  color: #cce8ff;
  pointer-events: none;
  z-index: 9999;
  display: none;
  line-height: 1.7;
  max-width: 200px;
}
</style>
</head>
<body>

<h1>⚗️ Reaction Mechanism</h1>
<div class="mech-label" id="mechLabel"></div>

<div id="errorMsg">
  ⚠️ No ATN data found.<br>
  Please load an ATN file in the simulator first.
</div>

<div id="diagramWrap" style="display:none">
  <svg id="flowSvg"></svg>
  <div class="legend">
    <span>
      <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#00ff88" stroke-width="2" marker-end="url(#legE)"/></svg>
      Electrochemical (E)
    </span>
    <span>
      <svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#ffcc44" stroke-width="2" stroke-dasharray="5,3"/></svg>
      Chemical (C)
    </span>
  </div>
</div>

<a class="back-btn" onclick="window.close()" href="javascript:void(0)">← Back to Simulator</a>

<div class="tip" id="tip"></div>

<script>
// ══════════════════════════════════════════════
//  ATN parser — extracts species, E/C reactions
// ══════════════════════════════════════════════
function parseATN(text) {
  var D = { n: 0, eRxns: [], cRxns: [], conc: {}, diff: {} };
  var lines = text.split(/\r?\n/);

  function block(tag) {
    var re = new RegExp(tag, 'i');
    for (var i = 0; i < lines.length; i++) {
      if (re.test(lines[i])) {
        var buf = [];
        for (var j = i + 1; j < lines.length; j++) {
          var l = lines[j].trim();
          if (!l) continue;
          if (l.startsWith('[')) break;
          buf.push(l);
        }
        return buf.join('\n');
      }
    }
    return '';
  }

  D.n = parseInt(block('Number of Reaction-diffusion Species')) || 0;

  // ── Electron Transfer ──
  var etb = block('Electron Transfer Reactions');
  if (etb) {
    etb.replace(/\.\s*$/, '').split(/;/).forEach(function(r, i) {
      r = r.replace(/\.$/, '').trim();
      if (!r) return;
      var pp = r.split('|');
      var eq = pp[0].trim();
      var m = eq.match(/^(\d+)\s*\+\s*e\s*<-?>?\s*(\d+)$/i)
            || eq.match(/^e\s*\+\s*(\d+)\s*<-?>?\s*(\d+)$/i);
      D.eRxns.push({
        id: i + 1,
        ox:  m ? parseInt(m[1]) : null,
        red: m ? parseInt(m[2]) : null,
        E0:    pp[1] ? pp[1].trim() : '?',
        alpha: pp[2] ? pp[2].trim() : '?',
        n:     pp[3] ? pp[3].trim() : '?',
        k0:    pp[4] ? pp[4].trim() : '?',
      });
    });
  }

  // ── Chemical ──
  var crb = block('Homogeneous Chemical Reactions');
  if (crb) {
    crb.replace(/\.\s*$/, '').split(/;/).forEach(function(r, i) {
      r = r.replace(/\.$/, '').trim();
      if (!r) return;
      var pp = r.split('|');
      var eq = pp[0].trim();
      if (!eq) return;
      var rev = /\<-\>/.test(eq);
      var sides = eq.split(rev ? '<->' : '->');
      var lhs = [], rhs = [];
      if (sides.length >= 2) {
        lhs = sides[0].split('+').map(function(s){ return parseInt(s.trim()); }).filter(Boolean);
        rhs = sides[1].split('+').map(function(s){ return parseInt(s.trim()); }).filter(Boolean);
      }
      D.cRxns.push({
        id: i + 1, rawEq: eq, lhs: lhs, rhs: rhs, rev: rev,
        kf: pp[1] ? pp[1].trim() : '?',
        kb: pp[2] ? pp[2].trim() : '?',
      });
    });
  }

  // ── Concentrations ──
  parseMap(block('Initial Concentrations'), D.conc, parseFloat);

  // ── Diffusion ──
  parseMap(block('Diffusion Coefficients'), D.diff, function(v){ return v; });

  return D;
}

function parseMap(blk, map, conv) {
  if (!blk) return;
  blk.replace(/\.\s*$/, '').split(/;/).forEach(function(line) {
    line = line.replace(/\.$/, '').trim();
    if (!line) return;
    var pp = line.split('|');
    if (pp.length < 2) return;
    var val = conv(pp[1].trim());
    pp[0].split(',').forEach(function(s) {
      s = s.trim();
      if (s.indexOf('-') !== -1) {
        var rng = s.split('-');
        for (var i = parseInt(rng[0]); i <= parseInt(rng[1]); i++) map[i] = val;
      } else { map[parseInt(s)] = val; }
    });
  });
}

// ══════════════════════════════════════════════
//  Mechanism label  (EE / ECE / CE / etc.)
// ══════════════════════════════════════════════
function mechLabel(D) {
  var e = D.eRxns.length, c = D.cRxns.length;
  if (e === 0 && c === 0) return '—';
  if (e > 0 && c === 0) return 'E'.repeat(e) + ' Mechanism';
  if (e === 0 && c > 0) return 'C'.repeat(c) + ' Mechanism';
  return 'EC-type (' + e + 'E + ' + c + 'C) Mechanism';
}

// ══════════════════════════════════════════════
//  Draw SVG diagram
// ══════════════════════════════════════════════
function draw(D) {
  var svg = document.getElementById('flowSvg');
  var n = D.n;
  if (n === 0) return;

  // ── Build edge list ──
  // edge: { from, to, type:'E'|'C', label, detail, rev }
  var edges = [];
  D.eRxns.forEach(function(r) {
    if (r.ox && r.red) {
      edges.push({
        from: r.ox, to: r.red, type: 'E', rev: true,
        label: 'E' + r.id,
        detail: 'E° = ' + r.E0 + ' V\nα = ' + r.alpha + '\nk₀ = ' + r.k0,
      });
    }
  });
  D.cRxns.forEach(function(r) {
    r.lhs.forEach(function(a) {
      r.rhs.forEach(function(b) {
        edges.push({
          from: a, to: b, type: 'C', rev: r.rev,
          label: 'C' + r.id,
          detail: 'kf = ' + r.kf + '\nkb = ' + r.kb,
        });
      });
    });
  });

  // ── BFS level assignment ──
  var inDeg = {};
  for (var i = 1; i <= n; i++) inDeg[i] = 0;
  edges.forEach(function(e) { if (e.to >= 1 && e.to <= n) inDeg[e.to]++; });

  var level = {};
  var q = [];
  for (var i = 1; i <= n; i++) {
    if (inDeg[i] === 0) { level[i] = 0; q.push(i); }
  }
  if (q.length === 0) { level[1] = 0; q.push(1); }

  var seen = {};
  while (q.length) {
    var cur = q.shift();
    if (seen[cur]) continue;
    seen[cur] = true;
    edges.forEach(function(e) {
      if (e.from === cur && !seen[e.to]) {
        level[e.to] = Math.max(level[e.to] || 0, (level[cur] || 0) + 1);
        q.push(e.to);
      }
    });
  }
  for (var i = 1; i <= n; i++) { if (level[i] === undefined) level[i] = 0; }

  var maxLv = 0;
  for (var i = 1; i <= n; i++) maxLv = Math.max(maxLv, level[i]);

  // Group by level
  var grp = {};
  for (var i = 1; i <= n; i++) {
    var lv = level[i];
    if (!grp[lv]) grp[lv] = [];
    grp[lv].push(i);
  }
  var maxPerCol = 1;
  for (var lv = 0; lv <= maxLv; lv++) { if (grp[lv]) maxPerCol = Math.max(maxPerCol, grp[lv].length); }

  // ── Layout constants ──
  var W      = Math.min(860, window.innerWidth - 32);
  var NR     = window.innerWidth < 500 ? 22 : 30;   // node radius
  var cols   = maxLv + 1;
  var colGap = Math.max(110, Math.min(180, (W - NR * 2 - 40) / Math.max(cols - 1, 1)));
  var rowGap = Math.max(90, NR * 3.2);
  var svgW   = 40 + NR + colGap * (cols - 1) + NR + 40;
  var svgH   = 40 + NR + rowGap * (maxPerCol - 1) + NR + 50;
  svgH = Math.max(svgH, 200);

  svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);
  svg.setAttribute('height', svgH);

  // ── Node positions ──
  var pos = {};
  for (var lv = 0; lv <= maxLv; lv++) {
    var g = grp[lv] || [];
    var totalH = rowGap * (g.length - 1);
    var sy = (svgH - totalH) / 2;
    g.forEach(function(sid, gi) {
      pos[sid] = { x: 40 + NR + lv * colGap, y: sy + gi * rowGap };
    });
  }

  // ── SVG build ──
  var h = '';

  // defs: arrowheads
  h += '<defs>';
  h += mkArrow('aE',  '#00ff88');
  h += mkArrow('aEr', '#00ff88', 0.5);
  h += mkArrow('aC',  '#ffcc44');
  h += mkArrow('aCr', '#ffcc44', 0.5);
  h += '</defs>';

  // ── Group edges by from→to ──
  var edgeGroups = {};  // key: from.to → [e1, e2, ...]
  edges.forEach(function(e) {
    var key = e.from + '.' + e.to;
    if (!edgeGroups[key]) edgeGroups[key] = [];
    edgeGroups[key].push(e);
  });

  var objKeys = Object.keys(edgeGroups);

  // ── Edges ──
  objKeys.forEach(function(key) {
    var group = edgeGroups[key];
    var from = parseInt(key.split('.')[0]);
    var to   = parseInt(key.split('.')[1]);
    if (!pos[from] || !pos[to]) return;

    var p1 = pos[from], p2 = pos[to];
    var dx = p2.x - p1.x, dy = p2.y - p1.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 1) return;
    var ux = dx/dist, uy = dy/dist;

    var x1 = p1.x + ux*(NR+2), y1 = p1.y + uy*(NR+2);
    var x2 = p2.x - ux*(NR+11), y2 = p2.y - uy*(NR+11);

    var nEdges = group.length;
    var maxOff = (nEdges - 1) * 7;   // total spread
    var startOff = -maxOff / 2;

    group.forEach(function(e, gi) {
      var color = e.type === 'E' ? '#00ff88' : '#ffcc44';
      var dash  = e.type === 'C' ? '6,3' : 'none';
      var aFwd  = e.type === 'E' ? 'aE' : 'aC';

      var off = startOff + gi * 14;          // parallel offset for this edge
      var ox = -uy * off, oy = ux * off;    // perpendicular to edge direction

      if (e.rev) {
        h += line(x1+ox, y1+oy, x2+ox, y2+oy, color, 2.2, dash, 'url(#'+aFwd+')');
        h += line(x2+ox, y2+oy, x1+ox, y1+oy, color, 1.5, dash, 'url(#'+aFwd+')', 0.55);
      } else {
        h += line(x1+ox, y1+oy, x2+ox, y2+oy, color, 2.2, dash, 'url(#'+aFwd+')');
      }

      // edge label pill (use primary offset, center of group)
      var labelOff = startOff + Math.floor(nEdges/2) * 14;
      var lox = -uy * labelOff, loy = ux * labelOff;
      var mx = (x1+x2)/2 - uy*18 + lox, my = (y1+y2)/2 + ux*18 + loy;
      var lw = e.label.length * 7 + 12;
      h += '<rect x="'+(mx-lw/2)+'" y="'+(my-9)+'" width="'+lw+'" height="16" rx="5"' +
           ' fill="rgba(10,20,38,0.88)" stroke="'+color+'" stroke-width="0.8" opacity="0.9"/>';
      h += '<text x="'+mx+'" y="'+(my+4)+'" text-anchor="middle"' +
           ' font-size="11" font-weight="bold" fill="'+color+'">'+e.label+'</text>';

      // invisible wide hit area
      h += '<line x1="'+(x1+ox)+'" y1="'+(y1+oy)+'" x2="'+(x2+ox)+'" y2="'+(y2+oy)+'"' +
           ' stroke="transparent" stroke-width="18"' +
           ' class="edge-hit" data-lbl="'+e.label+'" data-detail="'+encEsc(e.detail)+'" data-color="'+color+'"/>';
    });
  });

  // ── Nodes ──
  for (var si = 1; si <= n; si++) {
    var p = pos[si];
    if (!p) continue;

    var concStr = D.conc[si] !== undefined ? D.conc[si]+' mM' : '–';
    var diffStr = D.diff[si] !== undefined ? D.diff[si]+' cm²/s' : '–';
    var roles   = getSpeciesRoles(si, D);
    var detail  = 'Conc: '+concStr+'\nD: '+diffStr+(roles.length ? '\n'+roles.join('\n') : '');

    // outer glow
    h += '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(NR+8)+'"' +
         ' fill="rgba(102,204,255,0.05)"/>';
    // node circle
    h += '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+NR+'"' +
         ' fill="rgba(12,28,52,0.92)" stroke="#66ccff" stroke-width="2"' +
         ' class="node" data-si="'+si+'" data-detail="'+encEsc(detail)+'"' +
         ' style="cursor:pointer"/>';
    // label
    var fs = window.innerWidth < 500 ? 12 : 15;
    h += '<text x="'+p.x+'" y="'+(p.y+fs/2-1)+'" text-anchor="middle"' +
         ' font-size="'+fs+'" fill="#ffffff" font-weight="bold" pointer-events="none">S'+si+'</text>';
    // concentration subtitle
    h += '<text x="'+p.x+'" y="'+(p.y+NR+16)+'" text-anchor="middle"' +
         ' font-size="9" fill="#3d6688" pointer-events="none">'+concStr+'</text>';
  }

  svg.innerHTML = h;

  // ── Tooltip ──
  var tip = document.getElementById('tip');

  function showTip(x, y, content, color) {
    tip.innerHTML = content.replace(/\n/g, '<br>');
    if (color) tip.style.borderColor = color;
    tip.style.display = 'block';
    var tw = tip.offsetWidth, th = tip.offsetHeight;
    var wx = window.innerWidth, wy = window.innerHeight;
    tip.style.left = Math.min(x + 14, wx - tw - 8) + 'px';
    tip.style.top  = Math.min(y - 10, wy - th - 8) + 'px';
  }
  function hideTip() { tip.style.display = 'none'; }

  svg.querySelectorAll('.node').forEach(function(el) {
    el.addEventListener('mousemove', function(ev) {
      var si = el.getAttribute('data-si');
      showTip(ev.clientX, ev.clientY,
        '<b style="color:#66ccff">S'+si+'</b>\n' + decEsc(el.getAttribute('data-detail')), '#66ccff');
    });
    el.addEventListener('mouseleave', hideTip);
    el.addEventListener('touchstart', function(ev) {
      ev.preventDefault();
      var si = el.getAttribute('data-si');
      var r = el.getBoundingClientRect();
      showTip(r.right, r.top,
        '<b style="color:#66ccff">S'+si+'</b>\n' + decEsc(el.getAttribute('data-detail')), '#66ccff');
      setTimeout(hideTip, 3000);
    });
  });

  svg.querySelectorAll('.edge-hit').forEach(function(el) {
    el.addEventListener('mousemove', function(ev) {
      var lbl = el.getAttribute('data-lbl');
      var color = el.getAttribute('data-color');
      showTip(ev.clientX, ev.clientY,
        '<b style="color:'+color+'">'+lbl+'</b>\n' + decEsc(el.getAttribute('data-detail')), color);
    });
    el.addEventListener('mouseleave', hideTip);
  });
}

// ── helpers ──
function mkArrow(id, color, op) {
  var o = op ? ' opacity="'+op+'"' : '';
  return '<marker id="'+id+'" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto">' +
         '<path d="M0,0 L0,8 L9,4 z" fill="'+color+'"'+o+'/></marker>';
}
function line(x1,y1,x2,y2,color,sw,dash,markerEnd,op) {
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"' +
    ' stroke="'+color+'" stroke-width="'+sw+'"' +
    (dash && dash !== 'none' ? ' stroke-dasharray="'+dash+'"' : '') +
    (markerEnd ? ' marker-end="'+markerEnd+'"' : '') +
    (op ? ' opacity="'+op+'"' : '') + '/>';
}
function getSpeciesRoles(si, D) {
  var r = [];
  D.eRxns.forEach(function(rx) {
    if (rx.ox  === si) r.push('Oxidized in E'+rx.id);
    if (rx.red === si) r.push('Reduced in E'+rx.id);
  });
  D.cRxns.forEach(function(rx) {
    if (rx.lhs.indexOf(si) !== -1) r.push('Reactant in C'+rx.id);
    if (rx.rhs.indexOf(si) !== -1) r.push('Product in C'+rx.id);
  });
  return r;
}
function encEsc(s) { return (s||'').replace(/"/g,'&quot;').replace(/\n/g,'&#10;'); }
function decEsc(s) { return (s||'').replace(/&quot;/g,'"').replace(/&#10;/g,'\n'); }

// ══════════════════════════════════════════════
//  Entry point
// ══════════════════════════════════════════════
(function() {
  var atn = sessionStorage.getItem('_ecnetsim_atn') || '';
  if (!atn.trim()) {
    document.getElementById('errorMsg').style.display = 'block';
    return;
  }
  var D = parseATN(atn);
  if (D.n === 0 && D.eRxns.length === 0 && D.cRxns.length === 0) {
    document.getElementById('errorMsg').style.display = 'block';
    return;
  }

  document.getElementById('mechLabel').textContent = mechLabel(D);
  document.getElementById('diagramWrap').style.display = 'block';
  draw(D);
})();
</script>
</body>
</html>
